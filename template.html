<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doro日报 | {{date}}</title>
    <link rel="icon" href="../assets/fish.svg" sizes="any" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        /* Archive collapsible sections */
        .archive-section {
            margin-top: 36px;
        }

        .current-weekly {
            background: var(--surface);
            border: 2px solid var(--accent-2);
            padding: 18px 26px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .current-weekly a {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-2);
            font-family: 'Bodoni Moda', 'ZCOOL XiaoWei', serif;
            transition: color 0.2s;
        }

        .current-weekly a:hover {
            color: var(--accent);
        }

        .archive-details {
            background: var(--surface);
            border: 2px solid var(--border);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .archive-details summary {
            font-family: 'Bodoni Moda', 'ZCOOL XiaoWei', serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 18px 26px;
            cursor: pointer;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            transition: background 0.15s;
        }

        .archive-details summary::-webkit-details-marker { display: none; }
        .archive-details summary::marker { display: none; }

        .archive-details summary::before {
            content: '▸';
            display: inline-block;
            font-size: 0.9rem;
            transition: transform 0.2s;
            color: var(--accent);
        }

        .archive-details[open] summary::before {
            transform: rotate(90deg);
        }

        .archive-details summary:hover {
            background: var(--accent-light);
        }

        .archive-count {
            font-size: 0.85rem;
            color: var(--muted);
            font-family: 'Literata', 'PingFang SC', serif;
            font-weight: 400;
        }

        .archive-paginated {
            padding: 0 26px 18px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .archive-item {
            display: block;
        }

        .archive-item a {
            display: block;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 10px 14px;
            text-align: center;
            font-size: 0.88rem;
            color: var(--text);
            transition: all 0.15s;
            border-radius: 2px;
        }

        .archive-item a:hover {
            background: var(--accent-light);
            color: var(--accent);
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .archive-item .archive-wd {
            display: block;
            font-size: 0.75rem;
            color: var(--accent-2);
            font-weight: 600;
        }

        .load-more-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 0 26px 18px;
            background: var(--surface-2);
            border: 1px dashed var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .load-more-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
        }

        .load-more-btn.hidden { display: none; }
    </style>
</head>
<body>
    <header class="site-header">
        <h1>🗞️ Doro日报</h1>
        <p class="tagline">Doro 帮你筛新闻 · 热点 / AI / 游戏 / 数码</p>
    </header>

    <div class="post-layout">
        <aside class="toc-sidebar">
            <div class="toc-sticky">
                <div class="toc-title">📖 模块导航</div>
                {{toc}}
            </div>
        </aside>

        <main class="container post-body">
            <div class="hero-date">
                <h2>🗞️ Doro日报 {{date}} <span class="weekday">{{weekday}}</span></h2>
                <p class="sub">哼哼～今天的新闻 Doro 帮你筛好了，趁热看！</p>
            </div>
            {{sections}}

            <!-- 本期 AI 周报 -->
            {{current_weekly_url}}

            <!-- 往期存档 -->
            <div class="archive-section">
                <details class="archive-details">
                    <summary>📚 往期日报 <span class="archive-count">({{daily_count}}期)</span></summary>
                    <div class="archive-paginated" id="daily-archive" data-page="0" data-page-size="10">
                        {{daily_archive}}
                    </div>
                    <button class="load-more-btn hidden" id="daily-more" onclick="loadMore('daily-archive')">加载更多...</button>
                </details>

                <details class="archive-details">
                    <summary>🔥 往期 AI 周报 <span class="archive-count">({{weekly_count}}期)</span></summary>
                    <div class="archive-paginated" id="weekly-archive" data-page="0" data-page-size="10">
                        {{weekly_archive}}
                    </div>
                    <button class="load-more-btn hidden" id="weekly-more" onclick="loadMore('weekly-archive')">加载更多...</button>
                </details>
            </div>

            <footer class="site-footer" style="border-top:none;margin-top:10px;">
                <p>✅ Doro日报由 Hermes 自动生成 · <a href="https://github.com/salmonc/daily-news" target="_blank">GitHub</a> · <a href="../index.html">返回首页</a></p>
            </footer>
        </main>
    </div>

    <script>
    (function() {
        function initPagination(container) {
            var items = container.querySelectorAll('.archive-item');
            var pageSize = parseInt(container.dataset.pageSize) || 10;
            var moreBtn = document.getElementById(container.id + '-more');
            if (!moreBtn) return;

            if (items.length <= pageSize) {
                moreBtn.classList.add('hidden');
                return;
            }

            items.forEach(function(item, i) {
                if (i >= pageSize) item.style.display = 'none';
            });
            moreBtn.classList.remove('hidden');
        }

        window.loadMore = function(containerId) {
            var container = document.getElementById(containerId);
            var items = container.querySelectorAll('.archive-item');
            var pageSize = parseInt(container.dataset.pageSize) || 10;
            var currentPage = parseInt(container.dataset.page) || 0;
            var nextPage = currentPage + 1;
            var startIdx = nextPage * pageSize;
            var endIdx = startIdx + pageSize;

            items.forEach(function(item, i) {
                if (i >= startIdx && i < endIdx) item.style.display = '';
            });

            container.dataset.page = nextPage;

            if (endIdx >= items.length) {
                var moreBtn = document.getElementById(containerId + '-more');
                if (moreBtn) moreBtn.classList.add('hidden');
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.archive-paginated').forEach(initPagination);
        });
    })();
    </script>
</body>
</html>
